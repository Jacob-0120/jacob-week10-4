<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Bootstrap Page</title>

  <!-- Bootstrap 3 -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <style>
    body {
      padding-top: 30px;
    }

    .container {
      max-width: 1000px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

    .jumbotron {
      padding: 80px 30px;
      margin-bottom: 40px;
    }

    .jumbotron h1 {
      font-size: 70px;
    }

    .form-group {
      margin-bottom: 40px;
    }

    .alert {
      font-size: 24px;
      padding: 30px;
      margin-bottom: 40px;
    }

    .btn {
      font-size: 24px;
      padding: 15px 25px;
    }

    .badge {
      font-size: 20px;
      margin-left: 10px;
      padding: 8px 15px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="jumbotron">
      <h1>My First Bootstrap Page</h1>
    </div>

    <form>
      <div class="form-group">
        <label for="userInput">Input:</label>
        <input type="text" class="form-control" id="userInput">
      </div>
    </form>

    <div class="alert alert-success">
      Successful alert
    </div>

    <button type="button" class="btn btn-default">Button</button>

    <span class="badge">badge</span>

  </div>

</body>
</html>
